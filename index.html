<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サンプル Amazon サイト</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Amazon</div>
    <div class="search-bar">
      <input type="text" placeholder="検索 Amazon.co.jp" />
      <button id="searchBtn">検索</button>
    </div>
    <nav class="nav">
      <a href="#">こんにちは, ログイン</a>
      <a href="#">注文履歴</a>
      <a href="#">カート</a>
    </nav>
  </header>
  <main>
    <section class="products">
      <div class="product">
        <img src="https://via.placeholder.com/150" alt="商品1" />
        <h3>商品1</h3>
        <p>¥1,000</p>
        <button>カートに入れる</button>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/150" alt="商品2" />
        <h3>商品2</h3>
        <p>¥2,000</p>
        <button>カートに入れる</button>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/150" alt="商品3" />
        <h3>商品3</h3>
        <p>¥3,000</p>
        <button>カートに入れる</button>
      </div>
      <div class="product">
        <img src="https://via.placeholder.com/150" alt="商品4" />
        <h3>商品4</h3>
        <p>¥4,000</p>
        <button>カートに入れる</button>
      </div>
    </section>
  </main>
  <footer>
    <p>© 2024 サンプル Amazon</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
